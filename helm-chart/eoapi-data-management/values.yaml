collectionSetup:
  enabled: true
  image:
    name: ghcr.io/stac-utils/pgstac
    tag: v0.9.2
  command:
    - "sh"
  args:
    - "/opt/initdb/run-collection-setup.sh"
  settings:
    eoapiReleaseName: eoapi
    resources:
      requests:
        cpu: "512m"
        memory: "1024Mi"
      limits:
        cpu: "512m"
        memory: "1024Mi"