{{- if (.Values.browser.enabled) }}
apiVersion: v1
kind: Service
metadata:
  labels:
    app: browser
  name: browser
spec:
  {{- if (and ($.Values.ingress.className) (eq $.Values.ingress.className "nginx")) }}
  type: "ClusterIP"
  {{- else }}
  type: "NodePort"
  {{- end }}
  ports:
  - name: '{{ $.Values.service.port }}'
    port: {{ $.Values.service.port }}
    targetPort: {{ $.Values.service.port }}
  selector:
    app: browser-{{ .Release.Name }}
{{- end }}